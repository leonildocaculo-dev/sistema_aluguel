name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: angolastay_testing
          POSTGRES_USER: sail
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: pdo_pgsql, pgsql, redis
        coverage: none
        
    - name: Copy .env
      run: php -r "file_exists('backend/.env') || copy('backend/.env.example', 'backend/.env');"
      
    - name: Install Dependencies
      working-directory: ./backend
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      working-directory: ./backend
      run: php artisan key:generate
      
    - name: Run Migrations
      working-directory: ./backend
      env:
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: angolastay_testing
        DB_USERNAME: sail
        DB_PASSWORD: password
      run: php artisan migrate --force
      
    - name: Execute tests
      working-directory: ./backend
      env:
        DB_CONNECTION: pgsql
        DB_HOST: 127.0.0.1
        DB_PORT: 5432
        DB_DATABASE: angolastay_testing
        DB_USERNAME: sail
        DB_PASSWORD: password
        REDIS_HOST: 127.0.0.1
      run: php artisan test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install Dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Type Check
      working-directory: ./frontend
      run: npx tsc --noEmit
