
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: angolastay_backend
    restart: unless-stopped
    tty: true
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=angolastay
      - DB_USERNAME=sail
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - angolastay-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: angolastay_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - angolastay-network

  nginx:
    image: nginx:alpine
    container_name: angolastay_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - backend
    networks:
      - angolastay-network

  postgres:
    image: postgis/postgis:15-3.3
    container_name: angolastay_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: angolastay
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - angolastay-network

  redis:
    image: redis:alpine
    container_name: angolastay_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - angolastay-network

networks:
  angolastay-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
